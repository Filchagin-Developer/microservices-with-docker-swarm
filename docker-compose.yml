version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - /vagrant/src/services/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager01

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASSWORD: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq/data
    networks:
      - backend
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager01

  session:
    image: filchagin/session-service:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: users_db
    networks:
      - backend
      - app-overlay
    deploy:
      replicas: 1

  hotel:
    image: filchagin/hotel-service:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hotels_db
    networks:
      - backend
    deploy:
      replicas: 1

  payment:
    image: filchagin/payment-service:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments_db
    networks:
      - backend
    deploy:
      replicas: 1

  loyalty:
    image: filchagin/loyalty-service:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: balances_db
    networks:
      - backend
    deploy:
      replicas: 1

  report:
    image: filchagin/report-service:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: statistics_db
      RABBIT_MQ_HOST: rabbitmq
      RABBIT_MQ_PORT: 5672
      RABBIT_MQ_USER: guest
      RABBIT_MQ_PASSWORD: guest
      RABBIT_MQ_QUEUE_NAME: messagequeue
      RABBIT_MQ_EXCHANGE: messagequeue-exchange
    networks:
      - backend
    deploy:
      replicas: 1

  booking:
    image: filchagin/booking-service:latest
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: reservations_db
      RABBIT_MQ_HOST: rabbitmq
      RABBIT_MQ_PORT: 5672
      RABBIT_MQ_USER: guest
      RABBIT_MQ_PASSWORD: guest
      RABBIT_MQ_QUEUE_NAME: messagequeue
      RABBIT_MQ_EXCHANGE: messagequeue-exchange
      HOTEL_SERVICE_HOST: hotel
      HOTEL_SERVICE_PORT: 8080
      PAYMENT_SERVICE_HOST: payment
      PAYMENT_SERVICE_PORT: 8080
      LOYALTY_SERVICE_HOST: loyalty
      LOYALTY_SERVICE_PORT: 8080
    networks:
      - backend
    deploy:
      replicas: 1

  gateway:
    image: filchagin/gateway-service:latest
    environment:
      SESSION_SERVICE_HOST: session
      SESSION_SERVICE_PORT: 8080
      HOTEL_SERVICE_HOST: hotel
      HOTEL_SERVICE_PORT: 8080
      BOOKING_SERVICE_HOST: booking
      BOOKING_SERVICE_PORT: 8080
      PAYMENT_SERVICE_HOST: payment
      PAYMENT_SERVICE_PORT: 8080
      LOYALTY_SERVICE_HOST: loyalty
      LOYALTY_SERVICE_PORT: 8080
      REPORT_SERVICE_HOST: report
      REPORT_SERVICE_PORT: 8080
    networks:
      - backend
      - app-overlay
    deploy:
      replicas: 1

  nginx-proxy:
    image: nginx:alpine
    ports:
      - "8081:8081"
      - "8087:8087"
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    networks:
      - app-overlay
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.hostname == manager01

volumes:
  postgres_data:
  rabbitmq_data:

networks:
  app-overlay:
    driver: overlay
    attachable: true
  backend:
    driver: overlay
    attachable: true

configs:
  nginx_conf:
    file: ./nginx/proxy.conf